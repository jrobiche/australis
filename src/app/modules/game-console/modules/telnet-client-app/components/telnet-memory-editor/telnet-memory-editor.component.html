<app-responsive-width-container
  [class.layout-handset]="breakpoint.isHandset$ | async"
  [class.layout-tablet]="breakpoint.isTablet$ | async"
  [class.layout-web]="breakpoint.isWeb$ | async"
>
  <app-page-title-toolbar heading="Memory">
    @if (breakpoint.isHandset$ | async) {
      <button
        aria-label="Resume threads"
        class="trailing-button"
        (click)="onResumeClick()"
        mat-icon-button
      >
        <mat-icon fontSet="material-icons-round">play_arrow</mat-icon>
      </button>
      <button
        aria-label="Suspend threads"
        class="trailing-button"
        (click)="onSuspendClick()"
        mat-icon-button
      >
        <mat-icon fontSet="material-icons-round">pause</mat-icon>
      </button>
    } @else {
      <button
        aria-label="Resume threads"
        (click)="onResumeClick()"
        mat-stroked-button
        class="trailing-button"
      >
        <mat-icon fontSet="material-icons-round">play_arrow</mat-icon>
        Resume
      </button>
      <button
        aria-label="Suspend threads"
        (click)="onSuspendClick()"
        mat-stroked-button
        class="trailing-button"
      >
        <mat-icon fontSet="material-icons-round">pause</mat-icon>
        Suspend
      </button>
    }
  </app-page-title-toolbar>
  <mat-card appearance="outlined">
    <mat-card-header>
      <form [formGroup]="inputForm">
        <div class="field-group">
          <mat-form-field>
            <mat-label>Start Address</mat-label>
            <input matInput formControlName="address" type="text" />
          </mat-form-field>
          <mat-form-field appearance="fill">
            <mat-label>Length</mat-label>
            <input matInput formControlName="length" type="text" />
          </mat-form-field>
        </div>
        <button mat-button type="submit" (click)="onSubmitClick()">
          Submit
        </button>
      </form>
    </mat-card-header>
  </mat-card>
  @if (dataSource.length > 0) {
    <mat-card class="table-card" appearance="outlined">
      <table
        mat-table
        [dataSource]="dataSource"
        class="mat-elevation-z8 demo-table"
      >
        <!-- Address Column -->
        <ng-container matColumnDef="memory-address">
          <th mat-header-cell *matHeaderCellDef>Address</th>
          <td mat-cell *matCellDef="let element" (click)="onRowClick(element)">
            <code>{{ element.address }}</code>
          </td>
        </ng-container>
        <!-- Hex Column -->
        <ng-container matColumnDef="memory-hex">
          <th mat-header-cell *matHeaderCellDef>Hex</th>
          <td mat-cell *matCellDef="let element" (click)="onRowClick(element)">
            <code>{{ element.hex }}</code>
          </td>
        </ng-container>
        <!-- ASCII Column -->
        <ng-container matColumnDef="memory-ascii">
          <th mat-header-cell *matHeaderCellDef>ASCII</th>
          <td mat-cell *matCellDef="let element" (click)="onRowClick(element)">
            <code>{{ element.ascii }}</code>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </mat-card>
  }
</app-responsive-width-container>
